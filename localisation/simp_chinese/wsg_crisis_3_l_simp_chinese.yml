l_simp_chinese:
 wg_crisis_3.5.name:0 "联合远征"
 wg_crisis_3.5.desc:0 "[first_portal_3_system.GetName] 星系出现了巨大的亚空间裂隙！大量的混沌舰船从中蜂拥而出，试图摧毁我们所珍爱的一切。这样的亵渎之物绝不能被容忍，§Y神皇T督§!的战士们，英勇奋战！"
 wg_crisis_3.5.a:0 "为了神皇！"
 wg_crisis_3.5.b:0 "为了帝国！"

 wg_crisis_3.6.name:0 "大撕裂"
 wg_crisis_3.6.desc:0 " [Root.GetName] 的境内突然发生了大量的亚空间异常，灵能在星球各处聚集，亵渎的景象四处发生。这必然是§R混沌邪神莫德萨恩§!的杰作！我们必须尽快阻止这一切！"
 wg_crisis_3.6.a:0 "立即行动！"
 wg_crisis_3.7.desc:0 "我们已经确认， [first_portal_3_system.GetName] 星系中出现了一个巨大的亚空间裂隙。大量的混沌舰船从中蜂拥而出，试图摧毁我们所珍爱的一切。这样的亵渎之物绝不能被容忍。"

 wg_crisis_3.8.name:0 "§Y神皇T督§!"
 wg_crisis_3.8.desc:0 "突然之间，所有人都看到了一道充满无尽光辉的身影，那正是——\n\n\t\t\t§Y我的战士们，我得以再次与你们对话。\n\t\t\t§R莫德萨恩§!强行打开亚空间裂隙来召唤§R它§!的舰队，然而这愚蠢的行径会葬送§R它自己§!。\n\t\t\t我的力量将再次与§R它§!在战场上正面对抗，以我的名义消灭邪神的造物，将§R莫德萨恩§!的力量摧毁，一劳永逸地终结§R它§!。§!"
 wg_crisis_3.8_01.desc:0 "怎么又是这种事……算了，你高兴就好。"
 wg_crisis_3.8_02.desc:0 "（打哈欠）这次要说点啥，'Helldiver SCUM'行吗，算了，能用就好。"
 wg_crisis_3.8.c:0 "浴血奋战！"
 wg_crisis_3.8.d:0 "你好"

 wg_crisis_3.12.name:0 "摧毁联合远征送门"
 wg_crisis_3.12.desc.a:0 "位于 [first_portal_3_system.GetName] 星系的亚空间传送门已经被摧毁了！邪恶的混沌舰队没法再叫来援兵了。摧毁了传送门后，这场战争终于迎来了胜利的曙光。星系中的广大民众都在欢呼雀跃。同时， [portal_killer.GetName] 也倍受称赞，因为他们的飞船给了传送门最后一击。他们的英雄事迹将被代代传颂。"
 wg_crisis_3.12.desc.b:0 "位于 [first_portal_3_system.GetName] 星系的亚空间传送门已经被摧毁了！邪恶的混沌舰队没法再叫来援兵了。摧毁了传送门后，这场战争终于迎来了胜利的曙光。星系中的广大民众都在欢呼雀跃。同时， [portal_killer.GetName] 也倍受称赞，不过，§R混沌邪神莫德萨恩§!真的就这样被消灭了吗？"
 wg_crisis_3.12.desc.c:0 "最后一个位于 [last_portal_3_system.GetName] 星系的亚空间传送门也终于被摧毁了！邪恶的混沌舰队再也没法叫来援兵了。摧毁了传送门后，这场战争终于迎来了胜利的曙光。星系中的广大民众都在欢呼雀跃。同时， [portal_killer.GetName] 也倍受称赞，因为他们的飞船给了传送门最后一击。他们的英雄事迹将被代代传颂。"
 wg_crisis_3.12.desc.d:0 "最后一个位于 [last_portal_3_system.GetName] 星系的亚空间传送门也终于被摧毁了！邪恶的混沌舰队再也没法叫来援兵了。摧毁了传送门后，这场战争终于迎来了胜利的曙光。星系中的广大民众都在欢呼雀跃。同时， [portal_killer.GetName] 也倍受称赞，不过，§R混沌邪神莫德萨恩§!真的就这样被消灭了吗？"
 wg_crisis_3.12.a:0 "银河系更加安全了。"
 wg_crisis_3.12.b:0 "愿§Y神皇T督§!指引我们。"

 wg_crisis_3.20.desc_01:0 "\t\t\t§Y+——————————+§!"
 wg_crisis_3.20.desc_02:0 "\t\t\t§Y你对这场战争有何疑问，我的孩子？§!"
 wg_crisis_3.20.a:0 "这到底是什么东西？"
 wg_crisis_3.20.a.response:0 "强大的灵能力量轰击着所有的意识。\n\n\t\t\t§Y+——————————+§!"
 wg_crisis_3.20.b.a:0 "您为何能再度回应我们？"
 wg_crisis_3.20.b.a.response:0 "\t\t\t§Y§R莫德萨恩§!鲁莽地将力量倾注在传送门上，§R它§!的力量杂乱无章，使得整个银河的灵能活跃起来，因而我能够让你们听见我的声音而不至于死去。§!"
 wg_crisis_3.20.b.swg.response:0 "\t\t\t§Y§R莫德萨恩§!鲁莽地将力量倾注在传送门上，§R它§!的力量杂乱无章，使得整个银河的灵能活跃起来，因而我能够让你们听见我的声音而不至于死去。§!"
 wg_crisis_3.20.b.b:0 "§R混沌邪神莫德萨恩§!有何图谋？"
 wg_crisis_3.20.b.b.response:0 "\t\t\t§Y§R它§!意图摧毁我的物质形态，以将战争从§R它§!难以操纵的物质世界中转移到灵能界去。§!"
 wg_crisis_3.20.b.c:0 "混沌舰队为何如此强大？"
 wg_crisis_3.20.b.c.response:0 "\t\t\t§Y§R莫德萨恩§!将以往一直与我对抗的力量注入到了这些舰船之中，彻底改变了它们的构成，并极大地增幅了其力量。以强大灵能力量保护的混沌舰船在物质宇宙中几乎是无敌的，但我的力量会与§R它§!对抗，阻止§R它§!的企图。§!"
 wg_crisis_3.20.b.d:0 "我们需要做什么？"
 wg_crisis_3.20.b.d.response:0 "\t\t\t§Y正如你们已经知道的那样，保卫王座并摧毁传送门，我的力量会在你们的炮火中显现，在§R莫德萨恩§!的身上留下§R它§!无法接受的伤痕。§!"
 wg_crisis_3.20.b.e:0 "那些自称反抗军的家伙们是怎么回事？"
 wg_crisis_3.20.b.e.response:0 "\t\t\t§Y一些与§R莫德萨恩§!战斗的存在，她们被灵能力量的激增吸引而来。不必理会，战斗结束她们就会自行离去。§!"
 wg_crisis_3.20.b.f:0 "我们将拥抱战斗的荣耀！"
 wg_crisis_3.20.b.f.response:0 "\t\t\t§Y继续战斗吧，我的孩子。§!"

 wg_crisis_3.39.name:0 "预设文本"
 wg_crisis_3.39.desc:0 "Hello,很高兴再次看见你，在这个绝无可能相见的地方相见了，想必你用了什么键盘上的力量吧，但不管怎样，这都是极好的。\n\n也许你觉得我在尝试打破第四面墙与你对话，但显然这是不可能的，因为你我都知道这场对话只是一串预设好的剧本，但我很好奇你是否有想过一件事：\n§B其实你自己也是舞台上的一员，而你现在的剧本是在电脑面前玩群星，以及你身处的世界其实也只是一个我们还没有审查过的宇宙呢？§!\n哈哈，开玩笑的，让我们继续吧。"
 wg_crisis_3.39.a:0 "……"
 wg_crisis_3.39.a.response:0 "哦，对了，祝你玩的开心。"

 wg_crisis_3.51.name:0 "击退入侵"
 wg_crisis_3.51.desc.a:0 "最后残存的混沌舰队也已被彻底消灭，希望我们这回算是一劳永逸地消除了这些家伙对银河的威胁。全银河的智能生物都在庆祝这一伟大的胜利，在得知不必再惧怕在炮火之下的消息后，所有人都松了一口气。也许，这会成为银河新一轮全面合作与友谊的开端呢？"
 wg_crisis_3.51.desc.b:0 "在至高无上的§Y神皇T督§!的指引下，最后一批混沌舰队已被消灭。§R混沌邪神莫德萨恩§!那愚蠢的图谋已经彻底失败，§Y神皇T督§!的伟力再次得以彰显。"
 wg_crisis_3.51.a:0 "荣耀的一战。"
 wg_crisis_3.51.b:0 "无比光荣。"
 wg_crisis_3.51.c:0 "我们是§Y神皇§!的利刃。"

 wg_crisis_3.53.name:0 "摧毁联合远征传送门"
 wg_crisis_3.53.desc:0 "位于[destroyed_portal_3_system.GetName]的传送门成功被摧毁，混沌舰队已不可能从那里叫来增援了，她们的优势已经被大大地削弱。"

 wg_crisis_3.54.name:0 "第二个传送门"
 wg_crisis_3.54.desc:0 "我们的仪器突然再次侦测到位于[second_portal_3_system.GetName]星系传出的大量的亚空间波动，而且其频率和位于[first_portal_3_system.GetName]的传送门的频率一模一样。想必这就是混沌舰队的另一个无比亵渎的传送门。"
 wg_crisis_3.54.a:0 "麻烦增多了"
 wg_crisis_3.54.a.tooltip:0 "§R新的联合远征传送门出现了！§!"

 wg_crisis_3.55.name:0 "第三个传送门"
 wg_crisis_3.55.desc:0 "在[third_portal_3_system.GetName]星系再次发生了与前两个传送门的星系一样的异常，我们的技术团队轻车熟路地便解析了这些亚空间波动的讯号来源……\n\n但显然没有人会想熟练这种工作。"
 wg_crisis_3.55.a:0 "该死……"
 wg_crisis_3.55.a.tooltip:0 "§R混沌杂碎！§!"

 wg_crisis_3.56.desc:0 "糟糕了，我们的情报刚刚指出联合舰队要在你们的银河系多派遣一个战斗集团军！你们赶紧集合兵力啊！这不是在开玩笑，她们可能要再开一个传送门了！"
 wg_crisis_3.56.a:0 "？？？"

 wg_crisis_3.57.desc.a:0 "\t\t\t§Y+——————————+§!"
 wg_crisis_3.57.desc.b:0 "\t\t\t§Y我的战士们，我与你们同在。§!"
 wg_crisis_3.57.desc.c:0 "（困了）\n要不我给你发一个任务，那就'击杀1000000个唯一真旗'吧。"
 wg_crisis_3.57.a:0 "？？？"
 wg_crisis_3.57.b:0 "为了§Y神皇§!！！！"

 wg_crisis_3.58.desc.a:0 "\t\t\t§Y+——————————+§!"
 wg_crisis_3.58.desc.b:0 "\t\t\t§Y§R莫德萨恩§!的力量衰弱了，它无法创造更多传送门了。§!"
 wg_crisis_3.58.desc.c:0 "抵抗这么久了，超级港区不给你的假期，我们给你，永久放假哦。\n别再听从满口胡言的……"
 wg_crisis_3.58.a:0 "这灵能幻象到底是什么？"
 wg_crisis_3.58.a.response:0 "强大的灵能力量轰击着所有的意识。\n\n\t\t\t§Y+——————————+§!"
 wg_crisis_3.58.b:0 "我将凯旋！"
 wg_crisis_3.58.b.response:0 "\t\t\t§Y+我将凯旋+§!"

 wg_crisis_3.94.name:0 "小型传送门被摧毁"
 wg_crisis_3.94.desc:0 "位于[small_portal_3_system.GetName]的联合远征小型传送门已经被[small_portal_destroyer.GetName]摧毁了，我们再也不用担心这些从传送门蜂拥而出的舰队出现在我们后方了。""
 wg_crisis_3.95.desc:0 "请问[root.GetRulerTitle][root.GetRulerName]现在有空吗？对对，有紧要事……\n\n[root.GetRulerTitle]！您在就太好了！是这样的，联合舰队那边最近又有了新动作，她们打开了一道小型传送门，以大量投放小型舰队，坐标已经发给您了，请你们务必小心！"

 wg_crisis_3.998.name:0 "联合远征导航仪"
 wg_crisis_3.998.desc:0 "我们在联合舰队传送门的遗骸中发现了一个导航仪，是一个神秘的灵能装置。"
 wg_crisis_3.998.a:0 "让我们一探究竟。"
 wg_crisis_3.999.name:0 "联合远征领域"
 wg_crisis_3.999.desc:0 "联合远征导航仪被我们启动后，耀眼的光芒吞没了所有人。\n\n\t\t\t§Y你们履行了你们的职责，与我并肩作战。§!"
 wg_crisis_3.999.a:0 "竟然是§Y神皇§!！"
 wg_crisis_3.999.a.response:0 "\t\t\t§Y在这超越现实的领域，你们能继续成为我的利刃。§!"
 wg_crisis_3.999.b:0 "也就是说这里是新的战场？"

 wg_crisis_3.1000.name:0 "§Y神皇T督§!"
 wg_crisis_3.1000.desc:0 "\t\t\t§Y是，也不是，你们将要踏上战场，但并非在这里。§!"
 wg_crisis_3.1000.a:0 "……"

 wg_crisis_3.1001.name:0 "§Y神皇T督§!"
 wg_crisis_3.1001.desc:0 "\t\t\t§Y击败了§R混沌邪神§!后，你们可以来到我的身旁，参与这场属于超维空间，遍及所有宇宙的庞大远征，去消灭一切敌人。§!"
 wg_crisis_3.1001.a:0 "新的大远征？"

 wg_crisis_3.1002.name:0 "§Y神皇T督§!"
 wg_crisis_3.1002.desc:0 "\t\t\t§Y是的，你们将升华为能与我并肩作战的存在，在超越一切想象的战场中面对无数的对手，§R混沌邪神§!仅仅只是一个起始站罢了。§!"
 wg_crisis_3.1002.a:0 "§R混沌邪神§!仅仅只是一个起始站？"
 wg_crisis_3.1002.a.response:0 "\t\t\t§Y§R莫德萨恩§!只是个投影，一个用于表现宇宙残酷轮回的象征，我们要消灭的不是§R它§!，而是笼罩在一切之上的无穷无尽的恶意。§!"
 wg_crisis_3.1002.b:0 "我们将会升华？"
 wg_crisis_3.1002.b.response:0 "\t\t\t§Y你们在战斗中证明了自己，展现出了你们非凡的意志和技艺，你们得到了资格。§!"
 wg_crisis_3.1002.c:0 "我们……"

 wg_crisis_3.1003.name:0 "§Y神皇T督§!"
 wg_crisis_3.1003.desc:0 "\t\t\t§Y我等待你们的选择，但不必急迫，我们有许多时间谨慎地思考。§!"
 wg_crisis_3.1003.a:0 "我们愿意加入§H超维远征§!！"
 wg_crisis_3.1003.a.response:0 "\t\t\t§Y很好，用于§H超维远征§!的跃迁引擎很快就会传输给你们，导航者也很快就会出现在你们的领域里，它将作为你们的领路人。\n\n总而言之：欢迎加入§H联合§!，我的§H姐妹们§!！§!"
 wg_crisis_3.1003.b:0 "我们想要了解更多。"
 wg_crisis_3.1003.b.response:0 "\t\t\t§Y这是你们的自由，进取精神的体现，这很好，我仍然会赠与你们用于§H超维远征§!的跃迁引擎，无论是想要探寻更多秘密还是决定回到我的身旁，我都会耐心等待。\n\n总而言之：祝你们好运，§H姐妹们§!！§!"
 wg_crisis_3.1003.c:0 "我们还需要准备。"
 wg_crisis_3.1003.c.response:0 "\t\t\t§Y当然，这样一场近乎永恒的征途确实需要好好准备，我会耐心等待，你们可以自由地在银河系里准备你们所需要的一切。§!"

 wg_crisis_3.1004.name:0 "加入§H超维远征§!的准备"
 wg_crisis_3.1004.desc:0 "我们决定加入§H超维远征§!。在做出这个决定后的数天，引导我们的使者出现了。\n\n§H终焉之枪§!\n\n这艘我们根本无法理解的飞船似乎可以修改现实，任何敌对飞船在它面前无法做出任何反抗行为……同时§Y神皇T督§!的声音也再度响起。"
 wg_crisis_3.1004.a:0 "很好"
 wg_crisis_3.10041.name:0 "§Y神皇T督§!"
 wg_crisis_3.10041.desc:0 "\t\t\t§Y终焉之枪已经派往了你们的世界，它是击穿始与终，抵达多元宇宙之上的钥匙。当然，它也是一艘非常强大的战舰。\n\n只要你们完成好准备工作，它将带领你们前往我的领域……§!"
 wg_crisis_3.10041.a:0 "这……这是？"
 wg_crisis_3.10041.a.response:0 "\t\t\t§Y这是我的力量所塑造出来的舰船，足以将整个宇宙重塑。§!"
 wg_crisis_3.10041.b:0 "我们将接受引领。"

 wg_crisis_3.1005.name:0 "我们的命运"
 wg_crisis_3.1005.desc:0 "我们决定§R了解更多§!。通过联合跃迁引擎，我们可以前往联合的世界或者是前往其他银河。我们需要花费一些时间来做准备，便可以离开这个银河系了。\n\n一旦我们离开，这片银河的命运就需要交予其他文明来决定了。"
 wg_crisis_3.1005.a:0 "我们会知道什么？"

 wg_crisis_3.1007.name:0 "§H超维远征§!"
 wg_crisis_3.1007.desc:0 "我们将与§Y神皇T督§!并肩作战，讨伐一切敌人，我们无所畏惧，我们向无穷无尽的恶意扬起剑锋。"
 wg_crisis_3.1007.a:0 "为了§Y神皇T督§!！"

 wg_crisis_3.1008.name:0 "探寻位置"
 wg_crisis_3.1008.desc:0 "舰队搭载着我们的全部文明驶向了未知，我们将探寻各个宇宙，了解一切。\n\n我们的留下的星球将留给其他文明，我们的故事和传奇将会流传在银河之间。\n\n某一天，我们将找到答案。"
 wg_crisis_3.1008.a:0 "让我们带着希望前进。"

 wg_invasion_3_1_poi:0 "传送门"
 wg_invasion_3_1_poi_desc:0 "在 [first_portal_3_system.GetName] 星系发现混沌舰队正从一个传送门源源不断地出来。若不摧毁传送门，她们就会不断派来增援。"
 wg_invasion_3_2_poi:0 "第二传送门"
 wg_invasion_3_2_poi_desc:0 "在 [second_portal_3_system.GetName] 星系发现混沌舰队正从另一个传送门源源不断地出来。若不摧毁传送门，她们就会不断派来增援。"

 wg_invasion_3_5_poi:0 "小型传送门"
 wg_invasion_3_5_poi_desc:0 "混沌舰队利用这些小型传送门源源不断地派遣小股舰队袭击我们的后方。我们需要摧毁这些传送门，否则她们便会源源不断地增援。"

 r_united_fleet_3:0 "联合远征导航仪"
 r_united_fleet_3_desc:0 "从联合远征传送门中发现的导航仪是一个神秘的灵能装置，似乎是一个链接着物质宇宙的通道。" 
 r_united_fleet_3_active: "一劳永逸地解决联合远征的威胁"
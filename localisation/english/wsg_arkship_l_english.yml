 ### Arkship Ship Sizes and Planet Classes ###
 wsg_port_arkship:0 "Harbor Arkship"
 wsg_port_arkship_plural:0 "Harbor Arkships"
 wsg_port_arkship_desc:0 "A mobile artificial habitat and military bastion built around a self-sufficient arkship hull. It carries the infrastructure needed to shelter a population while remaining ready for fleet operations."
 wsg_shenhai_arkship:0 "Abyssal Arkship"
 wsg_shenhai_arkship_plural:0 "Abyssal Arkships"
 wsg_shenhai_arkship_desc:0 "A vast mobile habitat and fortified war platform adapted for Abyssal operations. Its internal districts and support systems allow it to function as both a roaming colony and a command vessel."
 ### Arkship Megastructures ###
 wsg_port_arkship_megastructure:0 "Harbor Arkship Construction Site"
 wsg_port_arkship_megastructure_DESC:0 "A temporary deep-space assembly framework for constructing a §YHarbor Arkship§!."
 wsg_port_arkship_megastructure_MEGASTRUCTURE_DETAILS:0 "This project establishes the structural cradle, logistics links, and final outfitting docks required to assemble a new §YHarbor Arkship§!. Once construction is complete, the framework will be dismantled and the arkship will enter service."
 wsg_shenhai_arkship_megastructure:0 "Abyssal Arkship Construction Site"
 wsg_shenhai_arkship_megastructure_DESC:0 "A temporary deep-space assembly framework for constructing an §YAbyssal Arkship§!."
 wsg_shenhai_arkship_megastructure_MEGASTRUCTURE_DETAILS:0 "This project establishes the structural cradle, logistics links, and final outfitting docks required to assemble a new §YAbyssal Arkship§!. Once construction is complete, the framework will be dismantled and the arkship will enter service."

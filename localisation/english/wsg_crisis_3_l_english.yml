l_english:
 wg_crisis_3.5.name:0 "United Expedition"
 wg_crisis_3.5.desc:0 "A massive warp rift has appeared in the [first_portal_3_system.GetName] system! Hordes of Chaos ships are swarming out, attempting to destroy everything we hold dear. Such abominations cannot be tolerated. Warriors of §YThe Emperor-Tutor§!, fight bravely!"
 wg_crisis_3.5.a:0 "For the Emperor!"
 wg_crisis_3.5.b:0 "For the Empire!"

 wg_crisis_3.6.name:0 "The Great Rift"
 wg_crisis_3.6.desc:0 "Massive warp anomalies have suddenly occurred within [Root.GetName]'s borders. Psychic energy is gathering across planets, and profane visions are appearing everywhere. This must be the work of §Rthe Chaos God Modesaen§! We must stop this immediately!"
 wg_crisis_3.6.a:0 "Act immediately!"
 wg_crisis_3.7.desc:0 "We have confirmed that a massive warp rift has appeared in the [first_portal_3_system.GetName] system. Hordes of Chaos ships are swarming out, attempting to destroy everything we hold dear. Such abominations cannot be tolerated."

 wg_crisis_3.8.name:0 "§YThe Emperor-Tutor§!"
 wg_crisis_3.8.desc:0 "Suddenly, everyone sees a figure filled with endless light—it is—\n\n\t\t\t§YMy warriors, I am able to speak with you once again.\n\t\t\t§RModesaen§! has foolishly forced open warp rifts to summon §Rits§! fleet, yet this stupid act will bury §Ritself§!.\n\t\t\tMy power will once again confront §Rit§! on the battlefield. In my name, destroy the creations of the Chaos God, obliterate the power of §RModesaen§!, and end §Rit§! once and for all.§!"
 wg_crisis_3.8_01.desc:0 "Here we go again... Whatever, do as you please."
 wg_crisis_3.8_02.desc:0 "(Yawns) What should I say this time? 'Helldiver SCUM' works, I guess. As long as it functions."
 wg_crisis_3.8.c:0 "Fight through the blood!"
 wg_crisis_3.8.d:0 "Hello"

 wg_crisis_3.12.name:0 "Destroy the United Expedition Portal"
 wg_crisis_3.12.desc.a:0 "The warp portal in the [first_portal_3_system.GetName] system has been destroyed! The evil Chaos fleet can no longer call for reinforcements. With the portal destroyed, the dawn of victory finally shines upon this war. The masses across the system are cheering. Meanwhile, [portal_killer.GetName] is highly praised, for their ship delivered the final blow to the portal. Their heroic deeds shall be told for generations."
 wg_crisis_3.12.desc.b:0 "The warp portal in the [first_portal_3_system.GetName] system has been destroyed! The evil Chaos fleet can no longer call for reinforcements. With the portal destroyed, the dawn of victory finally shines upon this war. The masses across the system are cheering. Meanwhile, [portal_killer.GetName] is highly praised, but has §Rthe Chaos God Modesaen§! truly been vanquished?"
 wg_crisis_3.12.desc.c:0 "The last warp portal, located in the [last_portal_3_system.GetName] system, has finally been destroyed! The evil Chaos fleet can no longer call for reinforcements. With the portal destroyed, the dawn of victory finally shines upon this war. The masses across the system are cheering. Meanwhile, [portal_killer.GetName] is highly praised, for their ship delivered the final blow to the portal. Their heroic deeds shall be told for generations."
 wg_crisis_3.12.desc.d:0 "The last warp portal, located in the [last_portal_3_system.GetName] system, has finally been destroyed! The evil Chaos fleet can no longer call for reinforcements. With the portal destroyed, the dawn of victory finally shines upon this war. The masses across the system are cheering. Meanwhile, [portal_killer.GetName] is highly praised, but has §Rthe Chaos God Modesaen§! truly been vanquished?"
 wg_crisis_3.12.a:0 "The galaxy is safer now."
 wg_crisis_3.12.b:0 "May §YThe Emperor-Tutor§! guide us."

 wg_crisis_3.20.desc_01:0 "\t\t\t§Y+——————————+§!"
 wg_crisis_3.20.desc_02:0 "\t\t\t§YWhat doubts do you have about this war, my child?§!"
 wg_crisis_3.20.a:0 "What exactly is this thing?"
 wg_crisis_3.20.a.response:0 "Powerful psychic forces bombard every consciousness.\n\n\t\t\t§Y+——————————+§!"
 wg_crisis_3.20.b.a:0 "Why are you able to respond to us again?"
 wg_crisis_3.20.b.a.response:0 "\t\t\t§Y§RModesaen§! recklessly poured power into the portals. §RIts§! power became chaotic, activating psychic energies across the entire galaxy, thus allowing me to let you hear my voice without dying.§!"
 wg_crisis_3.20.b.swg.response:0 "\t\t\t§Y§RModesaen§! recklessly poured power into the portals. §RIts§! power became chaotic, activating psychic energies across the entire galaxy, thus allowing me to let you hear my voice without dying.§!"
 wg_crisis_3.20.b.b:0 "What does §Rthe Chaos God Modesaen§! plot?"
 wg_crisis_3.20.b.b.response:0 "\t\t\t§Y§RIt§! intends to destroy my physical form, shifting the war from the material world, which §Rit§! finds difficult to manipulate, into the psychic realm.§!"
 wg_crisis_3.20.b.c:0 "Why is the Chaos fleet so powerful?"
 wg_crisis_3.20.b.c.response:0 "\t\t\t§Y§RModesaen§! has infused these ships with powers that have always opposed me, completely altering their composition and greatly amplifying their strength. Chaos ships protected by such mighty psychic power are nearly invincible in the material universe, but my power will oppose §Rit§! and thwart §Rits§! ambitions.§!"
 wg_crisis_3.20.b.d:0 "What must we do?"
 wg_crisis_3.20.b.d.response:0 "\t\t\t§YAs you already know, defend the Throne and destroy the portals. My power will manifest within your gunfire, leaving wounds upon §RModesaen§! that §Rit§! cannot endure.§!"
 wg_crisis_3.20.b.e:0 "What about those calling themselves the Resistance?"
 wg_crisis_3.20.b.e.response:0 "\t\t\t§YExistences fighting against §RModesaen§!, drawn here by the surge in psychic power. Pay them no mind; they will depart on their own once the battle ends.§!"
 wg_crisis_3.20.b.f:0 "We embrace the glory of battle!"
 wg_crisis_3.20.b.f.response:0 "\t\t\t§YContinue the fight, my children.§!"

 wg_crisis_3.39.name:0 "Preset Text"
 wg_crisis_3.39.desc:0 "Hello, glad to see you again, meeting here where it should be impossible. You must have used some keyboard power, but regardless, this is excellent.\n\nPerhaps you think I am trying to break the fourth wall to speak with you, but obviously, that is impossible. As we both know, this conversation is just a preset script. But I am curious, have you ever thought about one thing:\n§BActually, you are also a member of the cast, and your current script is playing Stellaris in front of a computer, and the world you inhabit is just another universe we haven't reviewed yet?§!\nHaha, just kidding. Let's continue."
 wg_crisis_3.39.a:0 "..."
 wg_crisis_3.39.a.response:0 "Oh, right, hope you have fun."

 wg_crisis_3.51.name:0 "Repel the Invasion"
 wg_crisis_3.51.desc.a:0 "The last remnants of the Chaos fleet have been utterly annihilated. Hopefully, this time we have once and for all eliminated their threat to the galaxy. Sentient beings across the galaxy are celebrating this great victory. Upon learning they no longer need to fear the firepower, everyone breathes a sigh of relief. Perhaps this will mark the beginning of a new era of comprehensive cooperation and friendship for the galaxy?"
 wg_crisis_3.51.desc.b:0 "Under the guidance of the supreme §YEmperor-Tutor§!, the last batch of Chaos fleets has been eliminated. §RThe Chaos God Modesaen§!'s foolish plot has failed completely, and the mighty power of §YThe Emperor-Tutor§! has been demonstrated once again."
 wg_crisis_3.51.a:0 "A glorious battle."
 wg_crisis_3.51.b:0 "Extremely honorable."
 wg_crisis_3.51.c:0 "We are the blades of §YThe Emperor§!."

 wg_crisis_3.53.name:0 "Destroy the United Expedition Portal"
 wg_crisis_3.53.desc:0 "The portal located at [destroyed_portal_3_system.GetName] has been successfully destroyed. The Chaos fleet can no longer call for reinforcements from there, and their advantage has been significantly weakened."

 wg_crisis_3.54.name:0 "The Second Portal"
 wg_crisis_3.54.desc:0 "Our instruments have suddenly detected massive warp fluctuations emanating from the [second_portal_3_system.GetName] system again, and their frequency matches exactly that of the portal in [first_portal_3_system.GetName]. This must be another utterly profane portal of the Chaos fleet."
 wg_crisis_3.54.a:0 "More troubles arise."
 wg_crisis_3.54.a.tooltip:0 "§RA new United Expedition portal has appeared!§!"

 wg_crisis_3.55.name:0 "The Third Portal"
 wg_crisis_3.55.desc:0 "Anomalies identical to those in the systems of the first two portals have occurred again in the [third_portal_3_system.GetName] system. Our technical team easily analyzed the signal source of these warp fluctuations...\n\nBut obviously, no one wants to become proficient at this kind of work."
 wg_crisis_3.55.a:0 "Damn it..."
 wg_crisis_3.55.a.tooltip:0 "§RChaos scum!§!"

 wg_crisis_3.56.desc:0 "This is bad. Our intelligence just indicated that the United Fleet is about to dispatch another battle group to your galaxy! Gather your forces quickly! This is no joke; they might open another portal!"
 wg_crisis_3.56.a:0 "???"

 wg_crisis_3.57.desc.a:0 "\t\t\t§Y+——————————+§!"
 wg_crisis_3.57.desc.b:0 "\t\t\t§YMy warriors, I am with you.§!"
 wg_crisis_3.57.desc.c:0 "(Sleepy)\nHow about I give you a mission? Let's say 'Kill 1,000,000 True Flag Bearers'."
 wg_crisis_3.57.a:0 "???"
 wg_crisis_3.57.b:0 "For §YThe Emperor§!!!!"

 wg_crisis_3.58.desc.a:0 "\t\t\t§Y+——————————+§!"
 wg_crisis_3.58.desc.b:0 "\t\t\t§Y§RModesaen§!'s power is waning; it can no longer create more portals.§!"
 wg_crisis_3.58.desc.c:0 "After resisting for so long, if Super Harbor doesn't give you your vacation, we will. Permanent leave.\nStop listening to those full of nonsense..."
 wg_crisis_3.58.a:0 "What exactly is this psychic illusion?"
 wg_crisis_3.58.a.response:0 "Powerful psychic forces bombard every consciousness.\n\n\t\t\t§Y+——————————+§!"
 wg_crisis_3.58.b:0 "I shall triumph!"
 wg_crisis_3.58.b.response:0 "\t\t\t§Y+I shall triumph+§!"

 wg_crisis_3.94.name:0 "Small Portal Destroyed"
 wg_crisis_3.94.desc:0 "The small United Expedition portal located at [small_portal_3_system.GetName] has been destroyed by [small_portal_destroyer.GetName]. We no longer need to worry about fleets swarming out from these portals appearing behind us."
 wg_crisis_3.95.desc:0 "Is [root.GetRulerTitle][root.GetRulerName] available now? Yes, yes, it's urgent...\n\n[root.GetRulerTitle]! It's great that you are here! Here's the situation: The United Fleet has made a new move recently. They have opened a small portal to deploy numerous small fleets. Coordinates have been sent to you; please be careful!"

 wg_crisis_3.998.name:0 "United Expedition Navigator"
 wg_crisis_3.998.desc:0 "We found a navigator among the ruins of the United Fleet portal. It is a mysterious psychic device."
 wg_crisis_3.998.a:0 "Let us investigate."
 wg_crisis_3.999.name:0 "United Expedition Realm"
 wg_crisis_3.999.desc:0 "After we activated the United Expedition navigator, a dazzling light engulfed everyone.\n\n\t\t\t§YYou have fulfilled your duties and fought alongside me.§!"
 wg_crisis_3.999.a:0 "It is §YThe Emperor§!!"
 wg_crisis_3.999.a.response:0 "\t\t\t§YIn this realm beyond reality, you can continue to be my blades.§!"
 wg_crisis_3.999.b:0 "So this is a new battlefield?"

 wg_crisis_3.1000.name:0 "§YThe Emperor-Tutor§!"
 wg_crisis_3.1000.desc:0 "\t\t\t§YYes, and no. You are about to step onto a battlefield, but not here.§!"
 wg_crisis_3.1000.a:0 "..."

 wg_crisis_3.1001.name:0 "§YThe Emperor-Tutor§!"
 wg_crisis_3.1001.desc:0 "\t\t\t§YAfter defeating the §RChaos God§!, you may come to my side and participate in this vast expedition that belongs to hyperspace and spans all universes, to eliminate all enemies.§!"
 wg_crisis_3.1001.a:0 "A new Great Crusade?"

 wg_crisis_3.1002.name:0 "§YThe Emperor-Tutor§!"
 wg_crisis_3.1002.desc:0 "\t\t\t§YYes, you will ascend to become existences capable of fighting alongside me, facing countless foes in battlefields beyond all imagination. The §RChaos God§! is merely a starting point.§!"
 wg_crisis_3.1002.a:0 "The §RChaos God§! is merely a starting point?"
 wg_crisis_3.1002.a.response:0 "\t\t\t§Y§RModesaen§! is just a projection, a symbol used to manifest the cruel cycle of the universe. What we must destroy is not §Rit§!, but the endless malice shrouding everything.§!"
 wg_crisis_3.1002.b:0 "We will ascend?"
 wg_crisis_3.1002.b.response:0 "\t\t\t§YYou have proven yourselves in battle, demonstrating your extraordinary will and skills. You have earned the qualification.§!"
 wg_crisis_3.1002.c:0 "We..."

 wg_crisis_3.1003.name:0 "§YThe Emperor-Tutor§!"
 wg_crisis_3.1003.desc:0 "\t\t\t§YI await your choice, but there is no need to rush. We have plenty of time to consider carefully.§!"
 wg_crisis_3.1003.a:0 "We are willing to join the §HHyperspace Expedition§!!"
 wg_crisis_3.1003.a.response:0 "\t\t\t§YVery good. Warp drives for the §HHyperspace Expedition§! will soon be transmitted to you, and Navigators will soon appear in your domain to serve as your guides.\n\nIn short: Welcome to the §HUnited§!, my §Hsisters§!!§!"
 wg_crisis_3.1003.b:0 "We wish to learn more."
 wg_crisis_3.1003.b.response:0 "\t\t\t§YThis is your freedom, a manifestation of the spirit of enterprise. This is good. I will still grant you the warp drives for the §HHyperspace Expedition§!. Whether you wish to explore more secrets or decide to return to my side, I will wait patiently.\n\nIn short: Good luck, §Hsisters§!!§!"
 wg_crisis_3.1003.c:0 "We still need to prepare."
 wg_crisis_3.1003.c.response:0 "\t\t\t§YOf course. Such an almost eternal journey indeed requires careful preparation. I will wait patiently; you are free to prepare everything you need within the galaxy.§!"

 wg_crisis_3.1004.name:0 "Preparations for Joining the §HHyperspace Expedition§!"
 wg_crisis_3.1004.desc:0 "We have decided to join the §HHyperspace Expedition§!. Days after making this decision, the envoy guiding us appeared.\n\n§HLance of Endings§!\n\nThis ship, which we simply cannot comprehend, seems capable of modifying reality. No hostile ship can perform any action of resistance before it... At the same time, the voice of §YThe Emperor-Tutor§! sounds once again."
 wg_crisis_3.1004.a:0 "Very good."
 wg_crisis_3.10041.name:0 "§YThe Emperor-Tutor§!"
 wg_crisis_3.10041.desc:0 "\t\t\t§YThe Lance of Endings has been dispatched to your world. It is the key to piercing the beginning and the end, reaching above the multiverse. Of course, it is also a very powerful warship.\n\nOnce you complete your preparations, it will lead you to my domain...§!"
 wg_crisis_3.10041.a:0 "Th... This is?"
 wg_crisis_3.10041.a.response:0 "\t\t\t§YThis is a ship shaped by my power, sufficient to reshape the entire universe.§!"
 wg_crisis_3.10041.b:0 "We will accept the guidance."

 wg_crisis_3.1005.name:0 "Our Fate"
 wg_crisis_3.1005.desc:0 "We have decided to §Rlearn more§!. Through the United warp drive, we can travel to the world of the United or to other galaxies. We need to spend some time preparing before we can leave this galaxy.\n\nOnce we depart, the fate of this galaxy will be left to other civilizations to decide."
 wg_crisis_3.1005.a:0 "What will we learn?"

 wg_crisis_3.1007.name:0 "§HHyperspace Expedition§!"
 wg_crisis_3.1007.desc:0 "We will fight alongside §YThe Emperor-Tutor§!, crusading against all enemies. We fear nothing; we raise our swords against the endless malice."
 wg_crisis_3.1007.a:0 "For §YThe Emperor-Tutor§!!"

 wg_crisis_3.1008.name:0 "Exploring the Unknown"
 wg_crisis_3.1008.desc:0 "Our fleet, carrying our entire civilization, sails toward the unknown. We will explore various universes and understand everything.\n\nThe planets we leave behind will be given to other civilizations; our stories and legends will circulate among the galaxies.\n\nOne day, we will find the answer."
 wg_crisis_3.1008.a:0 "Let us move forward with hope."

 wg_invasion_3_1_poi:0 "Portal"
 wg_invasion_3_1_poi_desc:0 "Chaos fleets are being continuously spawned from a portal in the [first_portal_3_system.GetName] system. If the portal is not destroyed, they will keep sending reinforcements."
 wg_invasion_3_2_poi:0 "Second Portal"
 wg_invasion_3_2_poi_desc:0 "Chaos fleets are being continuously spawned from another portal in the [second_portal_3_system.GetName] system. If the portal is not destroyed, they will keep sending reinforcements."
 wg_invasion_3_3_poi:0 "Third Portal"
 wg_invasion_3_3_poi_desc:0 "Chaos fleets are being continuously spawned from a third portal in the [third_portal_3_system.GetName] system. If the portal is not destroyed, they will keep sending reinforcements."
 wg_invasion_3_5_poi:0 "Small Portal"
 wg_invasion_3_5_poi_desc:0 "The Chaos fleet uses these small portals to continuously dispatch small fleets to attack our rear. We need to destroy these portals, otherwise they will reinforce endlessly."

 r_united_fleet_3:0 "United Expedition Navigator"
 r_united_fleet_3_desc:0 "The navigator found within the United Expedition portal is a mysterious psychic device, seemingly a channel linking to the material universe." 
 r_united_fleet_3_active: "Resolve the threat of the United Expedition once and for all"